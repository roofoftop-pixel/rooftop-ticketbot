{% extends "base.html" %}
{% block body %}
<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;800&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#0a0a0a; --surface:#111; --border:#2a2a2a; --gold:#c9a84c; --text:#e8e8e8; --text-dim:#666; --red:#ef4444; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Mono',monospace; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-wrap { width:360px; }
  .login-logo { text-align:center; margin-bottom:32px; }
  .login-logo h1 { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; color:var(--gold); letter-spacing:0.05em; }
  .login-logo p { color:var(--text-dim); font-size:12px; margin-top:6px; }
  .login-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:32px; }
  .login-card h2 { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; margin-bottom:24px; color:var(--text); }
  .form-label { display:block; margin-bottom:6px; color:var(--text-dim); font-size:11px; text-transform:uppercase; letter-spacing:0.08em; }
  input[type=password] { width:100%; background:#1a1a1a; border:1px solid var(--border); color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:13px; padding:10px 14px; border-radius:4px; outline:none; }
  input[type=password]:focus { border-color:var(--gold); }
  .form-group { margin-bottom:20px; }
  .btn-login { width:100%; padding:11px; background:var(--gold); color:#000; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; border:none; border-radius:4px; cursor:pointer; letter-spacing:0.05em; transition:background 0.15s; }
  .btn-login:hover { background:#e0b85a; }
  .error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:var(--red); padding:10px 14px; border-radius:4px; font-size:12px; margin-bottom:16px; }
  .grid-bg { position:fixed; inset:0; z-index:-1; background-image: linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px); background-size:40px 40px; }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="login-wrap">
  <div class="login-logo">
    <h1>🎫 TICKETBOT</h1>
    <p>Roof of Top — Panel de Gestión</p>
  </div>
  <div class="login-card">
    <h2>Acceso al panel</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" name="password" placeholder="••••••••" autofocus />
      </div>
      <button type="submit" class="btn-login">INGRESAR →</button>
    </form>
  </div>
</div>
</body>
</html>
{% endblock %}
