{% extends "base.html" %}
{% block body %}
<!DOCTYPE html>
<html data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in — Support Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script>
  (function() {
    const t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<style>
  [data-theme="dark"]  { --bg:#111111; --surface:#1a1a1a; --border:#2a2a2a; --text:#e8e8e8; --text-dim:#888; --text-xdim:#555; --input-bg:#222; }
  [data-theme="light"] { --bg:#f9fafb; --surface:#ffffff; --border:#e5e7eb; --text:#111827; --text-dim:#6b7280; --text-xdim:#9ca3af; --input-bg:#f3f4f6; }
  :root { --accent: #c9a84c; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Geist', 'Inter', system-ui, sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s;
    -webkit-font-smoothing: antialiased;
  }

  /* subtle grid */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .login-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 360px;
    padding: 20px;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo-icon {
    width: 44px; height: 44px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 14px;
  }
  .login-logo h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .login-logo p {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  }
  .login-card-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 22px;
  }

  .form-label {
    display: block;
    margin-bottom: 5px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }
  .form-group { margin-bottom: 18px; }
  input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.12s;
  }
  input::placeholder { color: var(--text-xdim); }
  input:focus { border-color: var(--accent); }

  .btn-login {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #000;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-login:hover { opacity: 0.88; }

  .error {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    color: #f87171;
    padding: 9px 13px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 16px;
  }

  .hint {
    font-size: 11px;
    color: var(--text-xdim);
    margin-top: 3px;
  }

  .theme-btn {
    position: fixed; top: 16px; right: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    padding: 6px 11px;
    border-radius: 6px;
    cursor: pointer;
    z-index: 10;
    transition: color 0.12s, border-color 0.12s;
  }
  .theme-btn:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀ Light</button>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-logo-icon">🎫</div>
    <h1>Roof of Top</h1>
    <p>Support Panel</p>
  </div>
  <div class="login-card">
    <div class="login-card-title">Sign in</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" placeholder="Leave blank if admin" autocomplete="username" />
        <div class="hint">Leave blank to sign in as admin</div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" placeholder="••••••••" autofocus autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login">Sign in →</button>
    </form>
  </div>
</div>
<script>
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '☀ Light' : '☾ Dark';
}
(function() {
  const t = localStorage.getItem('theme') || 'dark';
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀ Light' : '☾ Dark';
})();
</script>
</body>
</html>
{% endblock %}
